<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stilbens Tech</title>
    <link rel="shortcut icon" href="img/stilbensTech-icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css"> 
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="container login-container">
        <header>
             <div class="header-brand">
                <img   id="logo-display" 
                        src="img/stilbensTech-icon.ico" alt="Logo-Empresa" 
                        style="width:100px; height:100px; border: 1px; border-radius:50%; object-fit:cover;"
                >
                <h3 style="padding-bottom: 20px; color:rgb(66, 190, 93)">Stilbens Tech</h3>
            <h2>Acesso ao Sistema</h2>
        </header>
        <form id="formLogin">
            <div class="form-group">
                <label>Utilizador (CPF)</label>
                <input type="text" id="userLogin" placeholder="000.000.000-00" 
                    oninput="mascaraCPF(this)" maxlength="14" autocomplete="username" required>
            </div>

            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="userPass" placeholder="******" autocomplete="current-password" required>
            </div>

            <div class="captcha-box">
                <div id="captcha-img-container"></div>
                <input type="text" id="captchaInput" placeholder="Digite o código" required>
            </div>
            <small id="msg-advertencia">Clique na imagem para trocar o código.</small>

            <button type="submit" class="btn-finish">Entrar no Sistema</button>
            <p id="msg-erro"></p>
        </div>
    </form>

    <script src="js/login.js"></script>

</body>
</html>
