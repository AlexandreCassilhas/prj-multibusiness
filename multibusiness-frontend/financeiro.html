<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title id="title">Financeiro</title>
    <link rel="shortcut icon" href="img/stilbensTech-icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/financeiro.css">
</head>
<body>
    <div class="container" style="max-width: 1100px;">
        <header class="main-header">
            <div class="header-brand">
                <img   id="logo-display" 
                        src="" alt="Logo-Empresa" 
                        style="width:120px; height:120px; border: 1px; border-radius:50%; object-fit:cover;"
                >
            </div>
            <div class="user-profile">
                <span id="userNameDisplay">Carregando...</span>
                <button class="btn-logout" onclick="window.location.href='dashboard.html'">Voltar ao Dashboard</button>
            </div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('caixa')">📅 Livro Caixa</button>
            <button class="tab-btn" onclick="switchTab('tipos')">⚙️ Tipos de Lançamento</button>
        </div>

        <div id="tab-caixa" class="tab-content active">
            <div class="header-actions">
                <h2 class="titulo-caixa">Movimentações</h2>
                    <div class="actions-right">
                        <button class="btn-secondary" onclick="window.print()" style="margin-right: 1px;">🖨️ Imprimir</button>
                        <button class="btn-novo" style="width: auto;" onclick="openCaixaModal()">+ Novo Lançamento</button>
                    </div>
            </div>
             <header class="print-only">
                <img id="logo-display-printable" 
                        src="" alt="Logo-Empresa" 
                        style="width:50px; height:50px; border-radius:50%; object-fit:cover;"
                >
                <h4 id="title-printable"></h4>
                <h2>LIVRO CAIXA</h2>
            </header>
            <div class="fin-summary-bar">
                <div class="fin-filters">
                    <input type="date" id="filtroInicio" class="input-dark">
                    <span>até</span>
                    <input type="date" id="filtroFim" class="input-dark">
                    <button id="filter-btn" class="btn-edit" onclick="loadCaixa()" style="padding: 8px 15px;">Filtrar</button>
                </div>
                <div class="fin-balance-summary">
                    <div class="balance-item">
                        <small>Entradas</small>
                        <span id="resumoEntradas" style="color: #238636;">R$ 0,00</span>
                    </div>
                    <div class="balance-item">
                        <small>Saídas</small>
                        <span id="resumoSaidas" style="color: #da3633;">R$ 0,00</span>
                    </div>
                    <div class="balance-item total">
                        <small>Saldo Período</small>
                        <span id="resumoSaldo">R$ 0,00</span>
                    </div>
                </div>
            </div>
            <table id="tabela-contabil">
                <thead>
                    <tr>
                        <th>Ordem</th>
                        <th>Data</th>
                        <th>Tipo / Descrição</th>
                        <th width="100">Entrada (R$)</th>
                        <th width="100">Saída (R$)</th>
                        <th class="no-print">Ações</th> </tr>
                </thead>
                <tbody id="caixa-body"></tbody>
                <tfoot id="caixa-footer">
                    </tfoot>
            </table>
        </div>


        <div id="tab-tipos" class="tab-content">
            <div class="header-actions">
                <h2>Configuração de Tipos</h2>
                <button class="btn-finish" style="width: auto;" onclick="openTipoModal()">+ Novo Tipo</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Descrição</th>
                        <th>Categoria</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tipos-body"></tbody>
            </table>
        </div>
    </div>

    <div id="modal-caixa" class="modal">
        <div class="modal-content">
            <h3 id="caixaModalTitle">Lançamento de Caixa</h3>
            <form id="formCaixa">
                <input type="hidden" id="caixaId">
                <div class="radio-group">
                    <label><input type="radio" name="fluxo" value="Entrada" checked onchange="filterTypesByFluxo()"> Entrada</label>
                    <label><input type="radio" name="fluxo" value="Saída" onchange="filterTypesByFluxo()"> Saída</label>
                </div>
                <div class="form-group">
                    <label>Tipo de Lançamento</label>
                    <select id="caixaTipoSelect" required></select>
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <input type="text" id="caixaDesc">
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Data</label>
                        <input type="date" id="caixaData" required>
                    </div>
                    <div class="form-group">
                        <label>Valor (R$)</label>
                        <input type="number" id="caixaValor" step="0.01" required>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn-finish">Salvar</button>
                    <button type="button" class="btn-close" onclick="closeModal('modal-caixa')">Cancelar</button>
                </div>
            </form>
        </div>
    </div>


    <div id="modal-tipo" class="modal">
        <div class="modal-content" style="max-width: 450px;">
            <h3 id="tipoModalTitle">Novo Tipo de Lançamento</h3>
            <form id="formTipo">
                <input type="hidden" id="tipoId"> <div class="form-group">
                    <label>Descrição do Tipo</label>
                    <input type="text" id="tipoDesc" placeholder="Ex: Manutenção Predial" required>
                </div>

                <div class="form-group">
                    <label>Categoria (Entrada/Saída)</label>
                    <select id="tipoFluxo" required>
                        <option value="Entrada">Entrada</option>
                        <option value="Saída">Saída</option>
                    </select>
                </div>

                <div class="modal-actions">
                    <button type="submit" class="btn-finish">Salvar Tipo</button>
                    <button type="button" class="btn-close" onclick="closeModal('modal-tipo')">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/financeiro.js"></script>
</body>
</html>
